name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, release
    runs-on: macos-latest
    env:
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Full history + all tags so scripts/release-notes.sh can diff
          # against the previous tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag and verify Cargo.toml version
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          CARGO_VERSION=$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $TAG (version $VERSION) does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Import Developer ID signing cert
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Prepend to the search list so codesign finds it without a prompt.
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          # Allow codesign/productsign to use the key non-interactively.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          rm -f "$CERT_PATH"

      - name: Build Grinch.app (universal)
        run: |
          make build UNIVERSAL=1
          # Sanity-check the binary really is fat.
          lipo -info Grinch.app/Contents/MacOS/Grinch

      - name: Notarize and staple Grinch.app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_API_ISSUER_ID: ${{ secrets.MACOS_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize-app.zip"
          # notarytool wants a flat archive of the bundle, not the bundle itself.
          ditto -c -k --keepParent Grinch.app "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$MACOS_API_ISSUER_ID" \
            --wait

          # Embed the ticket in the bundle so Gatekeeper validates offline.
          xcrun stapler staple Grinch.app
          xcrun stapler validate Grinch.app
          spctl --assess --type execute --verbose Grinch.app

      - name: Build DMG
        run: |
          set -euo pipefail
          make dmg
          # Verify the DMG packaged the right binary: universal AND with
          # the stapled notarization ticket intact. Mount, inspect, eject.
          # Without this check, a future Makefile change could silently
          # ship single-arch / unstapled artifacts (regression of #2).
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT_DIR" Grinch.dmg
          APP_BIN="$MOUNT_DIR/Grinch.app/Contents/MacOS/Grinch"
          lipo -info "$APP_BIN" | grep -E 'x86_64.*arm64|arm64.*x86_64' \
              || { echo "::error::DMG binary is not universal" >&2; exit 1; }
          xcrun stapler validate "$MOUNT_DIR/Grinch.app" \
              || { echo "::error::DMG .app is not stapled" >&2; exit 1; }
          hdiutil detach "$MOUNT_DIR" -quiet

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_API_ISSUER_ID: ${{ secrets.MACOS_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Notarize the DMG itself so Gatekeeper accepts it on download
          # without scary warnings (Apple's recommended flow notarizes both
          # layers — the .app's ticket is already stapled inside).
          xcrun notarytool submit Grinch.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$MACOS_API_ISSUER_ID" \
            --wait

          xcrun stapler staple Grinch.dmg
          xcrun stapler validate Grinch.dmg
          spctl --assess --type install --verbose Grinch.dmg

      - name: Package release artifacts
        id: package
        run: |
          set -euo pipefail
          ARTIFACT="Grinch-${{ steps.meta.outputs.tag }}.dmg"
          mv Grinch.dmg "$ARTIFACT"
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from git log
        id: notes
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          ./scripts/release-notes.sh auto "${{ steps.meta.outputs.tag }}" \
              > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          # Echo to the run log so it's visible without downloading the file.
          echo "--- generated notes ---"
          cat "$NOTES_FILE"
          echo "--- end ---"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Grinch ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
